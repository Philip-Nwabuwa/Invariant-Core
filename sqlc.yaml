version: "2"
sql:
  - engine: "postgresql"
    schema: "db/schema.sql"
    queries: "internal/ledger/postgres/queries"
    gen:
      go:
        package: "ledgerdb"
        out: "internal/ledger/postgres/ledgerdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          # Use google/uuid + time.Time instead of pgtype wrappers so the
          # domain/mapping layer stays clean.
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
  # The switch's own persistence (idempotency, transfer-state reads). Generated
  # into a separate switchdb package; same type overrides as the ledger block.
  - engine: "postgresql"
    schema: "db/schema.sql"
    queries: "internal/switch/postgres/queries"
    gen:
      go:
        package: "switchdb"
        out: "internal/switch/postgres/switchdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
  # The reconcile CLI's persistence (recon_runs + recon_exceptions). Generated
  # into a separate recondb package; same type overrides as the blocks above.
  - engine: "postgresql"
    schema: "db/schema.sql"
    queries: "internal/reconcile/postgres/queries"
    gen:
      go:
        package: "recondb"
        out: "internal/reconcile/postgres/recondb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

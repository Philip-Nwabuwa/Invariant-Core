version: "2"
sql:
  - engine: "postgresql"
    schema: "db/schema.sql"
    queries: "internal/ledger/postgres/queries"
    gen:
      go:
        package: "ledgerdb"
        out: "internal/ledger/postgres/ledgerdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          # Use google/uuid + time.Time instead of pgtype wrappers so the
          # domain/mapping layer stays clean.
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

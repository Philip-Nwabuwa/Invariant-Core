name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go build ./...
      # Unit + property tests. From Sprint 1 the ledger tests use testcontainers
      # (Postgres) and run here against the Docker daemon available on
      # ubuntu-latest; they skip cleanly when Docker is unreachable.
      - run: go test ./... -race -count=1
      # Sprint 5 (NS-503): the tagged integration suite — real-Postgres
      # serializable posting, idempotent replay, reversal recovery after a
      # simulated restart. ubuntu-latest provides the Docker daemon testcontainers
      # needs; the suite skips cleanly if it is ever unreachable.
      - run: make test-integration

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

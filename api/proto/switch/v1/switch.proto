syntax = "proto3";

package switch.v1;

option go_package = "github.com/Philip-Nwabuwa/Invariant-Core/api/gen/switch/v1;switchv1";

// SwitchService is the internal gRPC surface of the transfer engine.
service SwitchService {
  // Ping is a liveness check used while the real surface is being built.
  rpc Ping(PingRequest) returns (PingResponse);
  // RailCallback receives the rail's asynchronous outcome for a transfer. It is
  // idempotent: a duplicate callback for an already-terminal transfer is a
  // no-op (terminal-state guard), so the rail can safely deliver more than once.
  rpc RailCallback(RailCallbackRequest) returns (RailCallbackResponse);
  // CorrectiveReversal re-drives a stranded reversal for the transfer identified
  // by reference: reconcile calls it for each pending_reversal exception so the
  // re-reversal posts through the existing outbox path. It is idempotent — a
  // transfer already reversed (or not in reversal_pending) is a safe no-op.
  rpc CorrectiveReversal(CorrectiveReversalRequest) returns (CorrectiveReversalResponse);
}

// PingRequest is an empty liveness request.
message PingRequest {}

// PingResponse echoes service liveness.
message PingResponse {
  // ok is true when the service is serving.
  bool ok = 1;
}

// CallbackStatus is the rail's reported outcome for a transfer.
enum CallbackStatus {
  CALLBACK_STATUS_UNSPECIFIED = 0;
  CALLBACK_STATUS_SUCCESS = 1;
  CALLBACK_STATUS_DECLINED = 2;
}

// RailCallbackRequest identifies the transfer by its reference and reports the
// rail's settlement outcome.
message RailCallbackRequest {
  string reference = 1;
  CallbackStatus status = 2;
}

// RailCallbackResponse reports the transfer's state after the callback applied.
message RailCallbackResponse {
  string state = 1;
}

// CorrectiveReversalRequest identifies the transfer whose reversal must be
// re-driven, plus a free-text reason for the audit trail.
message CorrectiveReversalRequest {
  string reference = 1;
  string reason = 2;
}

// CorrectiveReversalResponse reports the transfer's state after the corrective
// request applied, and whether it actually re-enqueued a reversal (false means
// it was an idempotent no-op — already reversed or not awaiting reversal).
message CorrectiveReversalResponse {
  string state = 1;
  bool requeued = 2;
}

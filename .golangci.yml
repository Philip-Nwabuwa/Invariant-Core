version: "2"

# golangci-lint v2 config.
# Default linters (errcheck, govet, ineffassign, staticcheck, unused) are on
# implicitly; staticcheck in v2 subsumes the old gosimple checks.
linters:
  enable:
    - revive
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

# Formatters run via `golangci-lint fmt`.
formatters:
  enable:
    - gofumpt
    - goimports

services:
  postgres:
    # Pinned to match the testcontainers test harness; the engine version must
    # be consistent across dev, test, and CI.
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: invariantcore
      POSTGRES_PASSWORD: invariantcore
      POSTGRES_DB: invariantcore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invariantcore"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # All-in-one Jaeger: collector + query UI, no config needed.
  # OTLP gRPC on 4317; UI on http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC

  # Prometheus scrapes the service binaries running on the host (make run-*) via
  # host.docker.internal. NS-504.
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"

  # Grafana with the Prometheus datasource + the load dashboard auto-provisioned
  # from deployments/grafana. Anonymous admin so a fresh clone sees the dashboard
  # with no login. NS-504.
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
